<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BMI Calculator</title>
<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
    }
    body{
        display:flex;
        justify-content:center;
        align-items:center;
        min-height:100vh;
        background:aqua;
    }
    .calculator{
        width:350px;
        padding:20px;
        border:1px solid #333;
        border-radius:15px;
        background:rgb(130, 227, 227);
    }
    h1{
        text-align:center;
        margin-bottom:20px;
    }
    .input-section{
        margin-bottom:15px;
    }
    label{
        display:block;
        margin-bottom:5px;
        font-weight:bold;
    }
    input{
        width:100%;
        padding:8px;
        border:1px solid #555;
        border-radius:5px;
    }
    button{
        width:100%;
        padding:10px;
        border:none;
        border-radius:5px;
        background:green;
        color:white;
    }
    .output-section{
        margin-top:20px;
    }
</style>
</head>
<body>
<div class="calculator">
    <h1>BMI Calculator</h1>
    <div class="input-section">
        <label for="weight">Weight (kg)</label>
        <input type="number" id="weight" placeholder="Enter weight">
    </div>
    <div class="input-section">
        <label for="height">Height (feet)</label>
        <input type="number" id="height" step="0.01" placeholder="Example: 5.8">
    </div>
    <div class="input-section">
        <label for="age">Age</label>
        <input type="number" id="age" placeholder="Enter age">
    </div>
    <button onclick="calculateBMI()">Calculate BMI</button>
    <div class="output-section">
        <p>BMI: <span id="bmi-result">----</span></p>
    </div>
</div>
<script>
   function calculateBMI() {
    let weight = parseFloat(document.getElementById("weight").value);
    let heightFeet = parseFloat(document.getElementById("height").value);
    let age = parseInt(document.getElementById("age").value);
    let heightMeter = heightFeet * 0.3048;
    let bmi = weight / (heightMeter * heightMeter);
    document.getElementById("bmi-result").textContent = bmi.toFixed(2);
}
</script>
</body>
</html>
